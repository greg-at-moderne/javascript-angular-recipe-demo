name: Moderne JavaScript recipes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  MODERNE_CLI_VERSION: "4.1.2"

jobs:
  recipe-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Moderne CLI
        shell: bash
        run: |
          curl -sSL -o mod.jar https://repo1.maven.org/maven2/io/moderne/moderne-cli/${{ env.MODERNE_CLI_VERSION }}/moderne-cli-${{ env.MODERNE_CLI_VERSION }}.jar
          echo '#!/bin/bash' > mod
          echo 'java -jar "'"$GITHUB_WORKSPACE"'/mod.jar" "$@"' >> mod
          chmod +x mod

          cat > mod-run <<'EOF'
          #!/bin/bash
          set -o pipefail
          mod run "$@" 2>&1 | tee output.log
          # Strip carriage-return progress artifacts so overwritten status lines
          # (e.g. "Found 0 errors …") do not cause false-positive matches.
          sed $'s/.*\r//' output.log > output_rendered.log
          if grep -qE "Found [0-9]+ errors while running the recipe\." output_rendered.log; then
            echo "::warning::Recipe execution reported errors (may be bugs in recipe sub-components)"
            echo "--- SourcesFileErrors ---"
            mod study . --last-recipe-run --data-table SourcesFileErrors 2>&1 || true
            for csv in .moderne/run/*/datatables/org.openrewrite.table.SourcesFileErrors.csv; do
              [ -f "$csv" ] || continue
              python3 -c "
          import csv, sys
          with open(sys.argv[1]) as f:
              for row in csv.reader(f):
                  print('-------------')
                  print(','.join(row))
          print('-------------')
          " "$csv"
            done
          fi
          if grep -q "Unable to find recipe" output_rendered.log; then
            echo "Recipe not found"
            exit 1
          fi
          EOF
          chmod +x mod-run

          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH

      - name: Install recipe NPM package for rewrite-angular
        env:
          RECIPES_ANGULAR_VERSION: "1.1.0"
        shell: bash
        run: mod config recipes npm install @openrewrite/recipes-angular@${{ env.RECIPES_ANGULAR_VERSION }}

      - name: Build LST
        shell: bash
        run: mod build . --no-download

      - name: Run UpgradeToAngular21 recipe
        shell: bash
        run: mod-run . --recipe=org.openrewrite.angular.UpgradeToAngular21

      - name: Upload patch files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recipe-patches
          path: .moderne/run/*/fix.patch
          if-no-files-found: ignore
